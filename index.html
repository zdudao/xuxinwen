<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老许聊实体 - 每日商业资讯</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-color: #ffffff;
            --primary-color: #8b5cf6;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --shadow-light: 0 1px 3px rgba(0, 0, 0, 0.05);
            --shadow-hover: 0 4px 12px rgba(0, 0, 0, 0.1);
            --radius-sm: 8px;
            --radius-md: 12px;
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --card-color: #1e293b;
            --primary-color: #8b5cf6;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --shadow-light: 0 1px 3px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 4px 12px rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background-color 0.3s ease;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 16px;
        }

        .card {
            background-color: var(--card-color);
            border-radius: var(--radius-md);
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-light);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 300;
            letter-spacing: 0.5px;
            color: var(--text-primary);
        }

        .logo strong {
            font-weight: 600;
            color: var(--primary-color);
        }

        .theme-toggle {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background-color: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: all 0.2s ease;
        }

        .theme-toggle:hover {
            background-color: rgba(139, 92, 246, 0.1);
            border-color: var(--primary-color);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        @media (min-width: 640px) {
            .stats-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.05) 0%, rgba(139, 92, 246, 0.02) 100%);
            border: 1px solid rgba(139, 92, 246, 0.15);
            border-radius: var(--radius-sm);
            padding: 16px;
            text-align: center;
            transition: transform 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .tabs-container {
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 8px;
        }

        .tabs-container::-webkit-scrollbar {
            display: none;
        }

        .tabs {
            display: inline-flex;
            gap: 8px;
        }

        .tab {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background-color: transparent;
            color: var(--text-secondary);
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .tab.active {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }

        .tab:hover:not(.active) {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .hot-card {
            padding: 24px;
        }

        .hot-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .hot-date {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .hot-badge {
            font-size: 0.75rem;
            padding: 4px 10px;
            background-color: rgba(249, 115, 22, 0.1);
            color: #f97316;
            border-radius: 12px;
            font-weight: 500;
        }

        .hot-title {
            font-size: 1.25rem;
            font-weight: 700;
            line-height: 1.6;
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        .hot-btn {
            float: right;
            padding: 10px 20px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .hot-btn:hover {
            background-color: #7c3aed;
            transform: translateY(-1px);
        }

        .news-grid {
            display: grid;
            gap: 16px;
        }

        @media (min-width: 768px) {
            .news-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .news-card {
            padding: 16px;
            transition: all 0.3s ease;
        }

        .news-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .news-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .news-date {
            font-size: 0.75rem;
            padding: 3px 8px;
            background-color: rgba(139, 92, 246, 0.1);
            color: var(--primary-color);
            border-radius: 6px;
            font-weight: 500;
        }

        .news-category {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .news-title {
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.5;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .news-summary {
            font-size: 0.875rem;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .news-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .news-tag {
            font-size: 0.7rem;
            padding: 2px 8px;
            background-color: rgba(139, 92, 246, 0.08);
            color: var(--primary-color);
            border-radius: 4px;
        }

        .footer-card {
            text-align: center;
            padding: 20px;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .footer-card p {
            margin-bottom: 4px;
        }

        .footer-card a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .search-bar {
            margin-bottom: 16px;
        }

        .search-input {
            width: 100%;
            padding: 10px 16px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background-color: var(--card-color);
            color: var(--text-primary);
            font-size: 0.875rem;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <div class="logo"><strong>老许聊实体</strong> | 每日商业资讯 · 洞察行业趋势</div>
                <button class="theme-toggle" id="themeToggle" title="切换主题">🌙</button>
            </div>
            <div class="stats-grid" id="statsGrid"></div>
        </div>

        <div class="card">
            <div class="tabs-container">
                <div class="tabs" id="categoryTabs"></div>
            </div>
        </div>

        <div class="card hot-card" id="hotCard"></div>

        <div class="card">
            <div class="search-bar">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索新闻标题...">
            </div>
            <div class="news-grid" id="newsGrid"></div>
        </div>

        <div class="card footer-card">
            <p>关注「老许聊实体」，每天五分钟，带你看透行业趋势</p>
            <p style="font-size: 0.75rem;">©2026 老许聊实体</p>
        </div>
    </div>

    <script>
        let newsData = null;
        let currentCategory = 'all';
        let currentSearch = '';

        async function loadNews() {
            const response = await fetch('data/news.json');
            newsData = await response.json();
            render();
        }

        function render() {
            renderStats();
            renderCategories();
            renderHotNews();
            renderNewsList();
        }

        function renderStats() {
            const container = document.getElementById('statsGrid');
            container.innerHTML = newsData.stats.map(stat => `
                <div class="stat-card">
                    <div class="stat-value">${stat.value}</div>
                    <div class="stat-label">${stat.label}</div>
                </div>
            `).join('');
        }

        function renderCategories() {
            const container = document.getElementById('categoryTabs');
            container.innerHTML = newsData.categories.map(cat => `
                <button class="tab ${currentCategory === cat.id ? 'active' : ''}" 
                        onclick="filterByCategory('${cat.id}')">${cat.name}</button>
            `).join('');
        }

        function renderHotNews() {
            const container = document.getElementById('hotCard');
            const dateStr = newsData.date.replace(/-/g, '.');
            container.innerHTML = `
                <div class="hot-header">
                    <span class="hot-date">📅 ${dateStr} ${newsData.updateTime}</span>
                    <span class="hot-badge">最新</span>
                </div>
                <div class="hot-title">${newsData.hotNews.title}</div>
                <a href="${newsData.hotNews.link}" target="_blank" class="hot-btn">查看完整报告 →</a>
            `;
        }

        function renderNewsList() {
            const container = document.getElementById('newsGrid');
            let filtered = newsData.newsList;
            
            if (currentCategory !== 'all') {
                filtered = filtered.filter(n => n.category === currentCategory);
            }
            
            if (currentSearch) {
                const searchLower = currentSearch.toLowerCase();
                filtered = filtered.filter(n => 
                    n.title.toLowerCase().includes(searchLower) ||
                    n.summary.toLowerCase().includes(searchLower)
                );
            }

            container.innerHTML = filtered.map(news => `
                <div class="card news-card">
                    <div class="news-header">
                        <span class="news-date">${news.date}</span>
                        <span class="news-category">${news.categoryName}</span>
                    </div>
                    <div class="news-title">${news.title}</div>
                    <div class="news-summary">${news.summary}</div>
                    <div class="news-tags">
                        ${news.tags.map(tag => `<span class="news-tag">${tag}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        function filterByCategory(category) {
            currentCategory = category;
            renderCategories();
            renderNewsList();
        }

        function handleSearch(e) {
            currentSearch = e.target.value;
            renderNewsList();
        }

        function toggleTheme() {
            const theme = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
            document.documentElement.dataset.theme = theme;
            localStorage.setItem('theme', theme);
            document.getElementById('themeToggle').textContent = theme === 'dark' ? '☀️' : '🌙';
        }

        function initTheme() {
            const saved = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = saved || (prefersDark ? 'dark' : 'light');
            document.documentElement.dataset.theme = theme;
            document.getElementById('themeToggle').textContent = theme === 'dark' ? '☀️' : '🌙';
        }

        document.getElementById('searchInput').addEventListener('input', handleSearch);
        document.getElementById('themeToggle').addEventListener('click', toggleTheme);
        initTheme();
        loadNews();
    </script>
</body>
</html>
